<h1>Eliminación de Datos</h1>

<p>
Si desea solicitar la eliminación de los datos asociados a su cuenta o al uso de Konnexia, envíe un correo electrónico a:
</p>

<p>
<strong>correo@empresa.com</strong>
</p>

<p>
Incluya en el asunto del mensaje:
</p>

<p>
<strong>Eliminar mis datos</strong>
</p>

<p>
La solicitud será revisada y atendida en un plazo máximo de 48 horas.
</p>
